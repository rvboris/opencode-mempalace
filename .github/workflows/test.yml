name: Test

on:
  workflow_call:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint:ci

      - name: Test with Coverage
        run: bun run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

      - name: Build
        run: bun run build

  coverage-comment:
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov
          path: coverage

      - name: Comment coverage on pull request
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');

            const marker = '<!-- mempalace-coverage-comment -->';
            const coveragePath = 'coverage/lcov.info';
            const coverageText = fs.readFileSync(coveragePath, 'utf8');

            let found = 0;
            let hit = 0;

            for (const line of coverageText.split(/\r?\n/)) {
              if (line.startsWith('LF:')) found += Number(line.slice(3));
              if (line.startsWith('LH:')) hit += Number(line.slice(3));
            }

            const percent = found === 0 ? '0.00' : ((hit / found) * 100).toFixed(2);
            const body = [
              marker,
              '## Coverage',
              '',
              `- Line coverage: **${percent}%**`,
              `- Covered lines: **${hit}/${found}**`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
